# GitHub Profile Metrics
# Generates a rich SVG metrics card for your profile README
# Docs: https://github.com/lowlighter/metrics
name: GitHub Metrics

on:
  # Runs every Monday at 6 PM UTC (11:30 PM IST)
  schedule:
    - cron: "0 18 * * 1"
  # Run on push to main/master
  push:
    branches: ["master", "main"]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Profile
          user: Anuradhapumudu
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Colombo
          config_display: large

          # Isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Most used languages
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 365
          plugin_languages_recent_load: 500
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes

          # Notable contributions
          plugin_notable: yes
          plugin_notable_from: all

          # Activity feed
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_visibility: public

          # Followers
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following

          # Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_charts: yes

          # Lines of code changed
          plugin_lines: yes
          plugin_lines_sections: base
